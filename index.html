<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom & Balance | Women's Health & Wellness</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
h1, h2 { font-family: 'Playfair Display', serif; }

.aurora-bg {
    background-color: #0f172a;
    background-image: radial-gradient(at 0% 0%, #7c3aed55, transparent 50%),
                      radial-gradient(at 100% 100%, #2563eb55, transparent 50%);
}

.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
}

.feature-image {
    transition: 0.5s;
}
.glass:hover .feature-image {
    transform: scale(1.05);
}
</style>
</head>

<body class="aurora-bg text-white">

<!-- NAV -->
<nav class="glass p-4 flex justify-between">
    <h1 class="text-xl font-bold">Bloom & Balance</h1>
    <button onclick="welcomeVoice()">✨ Hear Welcome</button>
</nav>

<!-- HERO -->
<header class="p-10 grid md:grid-cols-2 gap-10 items-center">
    <div>
        <h1 class="text-5xl font-bold mb-6">
            Empowering your <span class="text-purple-300">inner strength.</span>
        </h1>
        <p class="mb-6">
            A modern sanctuary for maternal health.
        </p>
        <button class="bg-white text-black px-6 py-3 rounded-full">Get Started</button>
    </div>

    <img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d"
         class="rounded-3xl">
</header>

<!-- SERVICES -->
<section class="grid md:grid-cols-3 gap-6 p-10">

    <!-- CARD 1 -->
    <div class="glass p-5 rounded-2xl">
        <img src="/images/omar-lopez-_H1ZmUzwp9w-unsplash.jpg" class="rounded-xl mb-4">
        <h3 class="font-bold">Antenatal</h3>
        <p>Pregnancy guidance</p>
    </div>

    <!-- CARD 2 -->
    <div class="glass p-5 rounded-2xl">
        <img src="/images/neal-e-johnson-iLNKpdI0Pzg-unsplash.jpg" class="rounded-xl mb-4">
        <h3 class="font-bold">Perinatal</h3>
        <p>Recovery care</p>
    </div>

    <!-- CARD 3 -->
    <div class="glass p-5 rounded-2xl">
        <img src="https://images.unsplash.com/photo-1506126613408-eca07ce68773"
             class="rounded-xl mb-4">
        <h3 class="font-bold">Lifestyle</h3>
        <p>Stress & balance</p>
    </div>

</section>

<script>
function welcomeVoice() {
    const msg = new SpeechSynthesisUtterance(
        "Welcome to Bloom and Balance."
    );
    speechSynthesis.speak(msg);
}
</script>

</body>
</html>
